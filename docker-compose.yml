services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanchez_carrion_backend_dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.dev  # ← Usar variables de desarrollo
    depends_on:
      - db
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sanchez_carrion_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      # - "80:80"
      - "5173:5173"
    environment:
      # - VITE_API_URL=http://192.168.10.184:8000
      # - VITE_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

  db:
    image: postgres:17.9-alpine
    container_name: sanchez_carrion_db_dev
    env_file:
      - ./backend/.env.dev  # ← Usar variables de desarrollo
    volumes:
      - sanchez_carrion_postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sanchez_carrion_postgres_data_dev: