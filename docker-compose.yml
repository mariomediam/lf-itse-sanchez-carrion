services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app_backend_dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.dev  # ← Usar variables de desarrollo
    depends_on:
      - db
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://192.168.5.56:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    stdin_open: true
    tty: true

  db:
    image: postgres:17.9-alpine
    container_name: app_db_dev
    env_file:
      - ./backend/.env.dev  # ← Usar variables de desarrollo
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data_dev: